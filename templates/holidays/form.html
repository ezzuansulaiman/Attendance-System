{% extends "base.html" %}
{% block content %}
<a class="back-link" href="{{ url_for('holidays_list') }}">← Senarai Cuti Umum</a>

<div class="panel" style="max-width:480px">
  <div class="panel-head">
    <h3>{% if holiday %}Edit Cuti Umum{% else %}Tambah Cuti Umum{% endif %}</h3>
  </div>
  <div class="panel-body">
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="field" style="margin-bottom:14px">
        <label>Tarikh *</label>
        <input type="date" name="holiday_date" required
               value="{{ holiday.holiday_date if holiday else '' }}">
      </div>
      <div class="field" style="margin-bottom:14px">
        <label>Nama Cuti *</label>
        <input type="text" name="name" required
               value="{{ holiday.name if holiday else '' }}"
               placeholder="Contoh: Hari Kebangsaan">
      </div>
      <div class="field" style="margin-bottom:20px">
        <label>Skop</label>
        <select name="scope">
          <option value="national" {% if not holiday or holiday.scope == 'national' %}selected{% endif %}>Nasional</option>
          <option value="selangor" {% if holiday and holiday.scope == 'selangor' %}selected{% endif %}>Selangor</option>
        </select>
      </div>
      <div class="actions">
        <button type="submit" class="btn">{{ 'Kemaskini' if holiday else 'Simpan' }}</button>
        <a class="btn secondary" href="{{ url_for('holidays_list') }}">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
