{% extends "base.html" %}
{% block content %}
<a class="back-link" href="javascript:history.back()">← Kembali</a>

<div class="panel" style="max-width:480px">
  <div class="panel-head">
    <h3>Edit Kehadiran</h3>
  </div>
  <div class="panel-body">
    <p class="muted" style="margin-bottom:16px">
      <strong>{{ emp.full_name }}</strong> — {{ att_date }}
    </p>
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="field" style="margin-bottom:18px">
        <label>Status Kehadiran</label>
        <select name="status">
          <option value="">— Tiada —</option>
          {% for code in status_codes %}
            <option value="{{ code }}"
              {% if current and current.status == code %}selected{% endif %}>
              {{ code }} — {{ status_labels[code] }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="actions">
        <button type="submit" class="btn">Simpan</button>
        <a class="btn secondary" href="{{ url_for('attendance_grid', region=emp.region) }}">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
